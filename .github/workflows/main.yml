name: Project Build and Artifact Secure

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# THE FIX: This environment variable forces the runner to use Node 24
# and silences the deprecation warnings for checkout and upload-artifact.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_archive:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Pull the latest code from your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js (Calibrated to Node 24 for 2026 standards)
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # Step 3: Install dependencies and build
      - name: Install and Build
        run: |
          npm install
          npm run build --if-present

      # Step 4: Secure and Save the Build Artifact
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: build/  # NOTE: Change to 'dist/' if you are using Vite/Vue
          retention-days: 5
