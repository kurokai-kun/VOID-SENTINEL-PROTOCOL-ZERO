name: Project Build and Artifact Secure

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # This fixes the Node 20 deprecation you saw earlier
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install and Build
        run: |
          npm install
          npm run build --if-present
          echo "--- DEBUG: LISTING FILES ---"
          ls -R # This helps us find the folder if it fails again

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          # TRY CHANGING THIS if it still fails:
          # If using Vite/Vue, use: path: dist/
          # If using React, use: path: build/
          path: build/ 
          if-no-files-found: error # This tells us specifically if the path is wrong
          retention-days: 5
